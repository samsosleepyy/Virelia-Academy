<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virelia Academy - System Boot</title>
    <style>
        /* รีเซ็ตค่าพื้นฐาน */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }

        /* -------------------------------------------
           GLOBAL CRT EFFECTS (ครอบคลุมทั้ง 2 หน้าจอ)
           ------------------------------------------- */
        .noise {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0.12;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: noise-anim 0.15s infinite linear;
        }

        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 101;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 6px;
        }

        .scanline-moving {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 20px;
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 20px rgba(255,255,255,0.1);
            animation: scanline-move 6s linear infinite;
            z-index: 102;
            pointer-events: none;
        }

        .vignette {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none;
            z-index: 105;
        }

        .screen-flicker {
            animation: crt-flicker 0.15s infinite;
        }

        @keyframes noise-anim {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5%, 5%); }
            40% { transform: translate(5%, -5%); }
            60% { transform: translate(-5%, -5%); }
            80% { transform: translate(5%, 5%); }
            100% { transform: translate(0, 0); }
        }

        @keyframes scanline-move {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        @keyframes crt-flicker {
            0% { opacity: 0.95; }
            50% { opacity: 1; }
            100% { opacity: 0.98; }
        }

        /* -------------------------------------------
           SCREEN 1: START SCREEN (ปุ่ม CONNECT)
           ------------------------------------------- */
        .start-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* ตัวห่อหุ้มปุ่มเพื่อทำแอนิเมชัน Glitch */
        .start-glitch-wrapper.is-glitching {
            animation: btn-glitch-anim 0.2s infinite;
        }

        @keyframes btn-glitch-anim {
            0%, 100% { transform: translate(0, 0); filter: none; }
            20% { transform: translate(-3px, 2px); filter: drop-shadow(4px 0 0 rgba(0, 255, 255, 0.8)) drop-shadow(-4px 0 0 rgba(255, 0, 0, 0.8)); }
            40% { transform: translate(3px, -2px); filter: drop-shadow(-4px 0 0 rgba(0, 255, 255, 0.8)) drop-shadow(4px 0 0 rgba(255, 0, 0, 0.8)); }
            60% { transform: translate(-2px, -3px); filter: drop-shadow(4px 0 0 rgba(0, 255, 255, 0.8)) drop-shadow(-4px 0 0 rgba(255, 0, 0, 0.8)); }
            80% { transform: translate(2px, 3px); filter: drop-shadow(-4px 0 0 rgba(0, 255, 255, 0.8)) drop-shadow(4px 0 0 rgba(255, 0, 0, 0.8)); }
        }

        /* ดีไซน์ปุ่ม Cyberpunk (ตัดมุมทะแยง) */
        .cyber-btn {
            position: relative;
            padding: 20px 60px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            font-weight: 900;
            color: #ff3333;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 8px;
            /* ตัดมุมซ้ายบนและขวาล่าง 20px */
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            transition: all 0.3s;
        }

        /* ขอบแดงด้านนอกสุด */
        .cyber-btn::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #ff3333;
            z-index: -2;
        }

        /* พื้นหลังสีดำด้านใน (เล็กกว่าขอบนอก 2px เพื่อให้เกิดเส้นขอบ) */
        .cyber-btn::after {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            background: #050505;
            /* ปรับองศาการตัดให้พอดีกับด้านใน */
            clip-path: polygon(18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%, 0 18px);
            z-index: -1;
            transition: background 0.3s;
        }

        .cyber-btn span {
            position: relative;
            z-index: 2;
            transition: color 0.3s, text-shadow 0.3s;
        }

        /* เมื่อเอาเมาส์ชี้ปุ่ม */
        .cyber-btn:hover {
            filter: drop-shadow(0 0 10px rgba(255, 51, 51, 0.6));
        }
        .cyber-btn:hover::after {
            background: #1a0000;
        }
        .cyber-btn:hover span {
            color: #fff;
            text-shadow: 0 0 15px #ff3333;
        }


        /* -------------------------------------------
           SCREEN 2: MAIN CRT INTRO (โลโก้)
           ------------------------------------------- */
        .crt-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            /* ซ่อนไว้ก่อน จะใช้ JS เปลี่ยนเป็น flex เมื่อกดปุ่ม */
            display: none; 
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        /* เอฟเฟกต์แสงวาบเปิดทีวี */
        .tv-turn-on {
            position: absolute;
            top: 50%; left: 50%;
            width: 100%; height: 100%;
            background-color: #fff;
            transform: translate(-50%, -50%) scale(0, 0);
            z-index: 50; /* บังเนื้อหา แต่ต่ำกว่า Global Effects */
            /* แอนิเมชันจะเริ่มทำงานเมื่อ container ถูกสั่งให้แสดง (display: flex) */
            animation: turn-on 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            pointer-events: none;
        }

        @keyframes turn-on {
            0% { transform: translate(-50%, -50%) scale(0.001, 0.001); background-color: #ffffff; opacity: 1; }
            20% { transform: translate(-50%, -50%) scale(1, 0.005); background-color: #ffffff; opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1, 1); background-color: #ffffff; opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1, 1); background-color: transparent; opacity: 0; visibility: hidden; }
        }

        .content {
            opacity: 0;
            animation: show-content 0.1s 1.2s forwards;
            z-index: 5;
            position: relative;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes show-content {
            to { opacity: 1; }
        }

        /* โครงสร้างสำหรับทำเอฟเฟกต์ Glitch ให้กับรูปภาพโลโก้ */
        .glitch-wrapper {
            position: relative;
            display: inline-block;
            max-width: 80vw;
            width: 450px;
            aspect-ratio: 1 / 1;
        }

        .glitch-img {
            display: block;
            width: 100%; height: 100%;
            object-fit: contain;
            filter: contrast(1.1) brightness(0.9) drop-shadow(0 0 15px rgba(255, 51, 51, 0.6));
            animation: img-pulse 2s infinite alternate;
            position: relative;
            z-index: 2;
        }

        @keyframes img-pulse {
            0% { filter: contrast(1.1) brightness(0.9) drop-shadow(0 0 10px rgba(255, 51, 51, 0.4)); }
            100% { filter: contrast(1.1) brightness(1) drop-shadow(0 0 25px rgba(255, 51, 51, 0.9)); }
        }

        .glitch-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            pointer-events: none;
            z-index: 3;
        }

        .is-glitching .glitch-img {
            opacity: 0.8;
            filter: contrast(1.5) brightness(1.2) grayscale(0.2);
        }

        .is-glitching .glitch-layer-1 {
            opacity: 0.7; transform: translate(-8px, 3px);
            mix-blend-mode: screen; filter: hue-rotate(90deg) saturate(3);
            animation: glitch-anim-1 0.2s infinite linear alternate-reverse;
        }

        .is-glitching .glitch-layer-2 {
            opacity: 0.7; transform: translate(8px, -3px);
            mix-blend-mode: screen; filter: hue-rotate(-90deg) saturate(3);
            animation: glitch-anim-2 0.3s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-8px, 1px); }
            20% { clip-path: inset(60% 0 10% 0); transform: translate(8px, -2px); }
            40% { clip-path: inset(40% 0 50% 0); transform: translate(-8px, 2px); }
            60% { clip-path: inset(80% 0 5% 0); transform: translate(8px, -1px); }
            80% { clip-path: inset(10% 0 70% 0); transform: translate(-8px, 1px); }
            100% { clip-path: inset(30% 0 50% 0); transform: translate(8px, -2px); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(8px, -1px); }
            20% { clip-path: inset(80% 0 5% 0); transform: translate(-8px, 2px); }
            40% { clip-path: inset(30% 0 20% 0); transform: translate(8px, -2px); }
            60% { clip-path: inset(70% 0 15% 0); transform: translate(-8px, 1px); }
            80% { clip-path: inset(5% 0 80% 0); transform: translate(8px, -1px); }
            100% { clip-path: inset(40% 0 30% 0); transform: translate(-8px, 2px); }
        }
    </style>
</head>
<body class="screen-flicker">

    <!-- OVERLAYS: เอฟเฟกต์จอทีวีที่จะอยู่ตลอดเวลา -->
    <div class="noise"></div>
    <div class="scanlines"></div>
    <div class="scanline-moving"></div>
    <div class="vignette"></div>

    <!-- SCREEN 1: หน้าจอเริ่มต้น (ปุ่ม CONNECT) -->
    <div id="start-screen" class="start-screen">
        <div class="start-glitch-wrapper" id="btn-glitch-wrapper">
            <button class="cyber-btn" id="connect-btn">
                <span>CONNECT</span>
            </button>
        </div>
    </div>

    <!-- SCREEN 2: หน้าจอ Intro หลัก (ซ่อนไว้รอถูกคลิก) -->
    <div id="main-crt" class="crt-container">
        <!-- เอฟเฟกต์หน้าจอวาบเปิดทีวี -->
        <div class="tv-turn-on"></div>

        <!-- โลโก้ -->
        <div class="content">
            <div class="glitch-wrapper" id="glitch-wrapper">
                <img src="logo.png" 
                     id="main-logo" 
                     class="glitch-img" 
                     alt="Virelia Academy Logo"
                     onerror="handleImageError(this)">
                <div class="glitch-layer glitch-layer-1"></div>
                <div class="glitch-layer glitch-layer-2"></div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // ดึง Element ต่างๆ มาใช้งาน
            const startScreen = document.getElementById('start-screen');
            const mainCrt = document.getElementById('main-crt');
            const connectBtn = document.getElementById('connect-btn');
            const btnGlitchWrapper = document.getElementById('btn-glitch-wrapper');
            
            const logoWrapper = document.getElementById('glitch-wrapper');
            const imgElement = document.getElementById('main-logo');
            const glitchLayers = document.querySelectorAll('.glitch-layer');

            // --- ส่วนจัดการโลโก้หลัก ---
            function setupGlitchLayers(src) {
                glitchLayers.forEach(layer => {
                    layer.style.backgroundImage = `url('${src}')`;
                });
            }
            setupGlitchLayers(imgElement.src);

            window.handleImageError = function(img) {
                img.onerror = null; 
                const fallbackSrc = 'https://i.ibb.co/9HM6dGQG/175-20260413000814.png';
                img.src = fallbackSrc;
                setupGlitchLayers(fallbackSrc);
            };

            // --- แอนิเมชันสุ่ม Glitch สำหรับปุ่ม CONNECT ---
            let btnGlitchTimeout;
            function triggerBtnGlitch() {
                btnGlitchWrapper.classList.add('is-glitching');
                const glitchDuration = Math.random() * 200 + 100;
                
                setTimeout(() => {
                    btnGlitchWrapper.classList.remove('is-glitching');
                    // สุ่มเวลาที่จะกระตุกครั้งต่อไป (1 - 4 วินาที)
                    const nextGlitchIn = Math.random() * 3000 + 1000;
                    btnGlitchTimeout = setTimeout(triggerBtnGlitch, nextGlitchIn);
                }, glitchDuration);
            }
            // เริ่มต้นให้ปุ่มกระตุกสุ่มทันที
            triggerBtnGlitch();


            // --- แอนิเมชันสุ่ม Glitch สำหรับโลโก้หลัก ---
            function triggerLogoGlitch() {
                logoWrapper.classList.add('is-glitching');
                const glitchDuration = Math.random() * 300 + 100;
                
                setTimeout(() => {
                    logoWrapper.classList.remove('is-glitching');
                    const nextGlitchIn = Math.random() * 3500 + 1500;
                    setTimeout(triggerLogoGlitch, nextGlitchIn);
                }, glitchDuration);
            }


            // --- อีเวนต์เมื่อกดปุ่ม CONNECT ---
            connectBtn.addEventListener('click', () => {
                // 1. ยกเลิกระบบ Glitch ของปุ่ม
                clearTimeout(btnGlitchTimeout);
                
                // 2. ซ่อนหน้าต่างปุ่ม CONNECT
                startScreen.style.display = 'none';
                
                // 3. แสดงหน้าจอหลัก (การเปลี่ยน display:none เป็น flex จะทำให้อนิเมชันเปิดทีวีเริ่มทำงานอัตโนมัติ)
                mainCrt.style.display = 'flex';
                
                // 4. รอให้อนิเมชันเปิดทีวีเสร็จสิ้น (ประมาณ 1.5 วินาที) แล้วเริ่มระบบ Glitch โลโก้
                setTimeout(() => {
                    triggerLogoGlitch();
                }, 1500);
            });
        });
    </script>
</body>
</html>
