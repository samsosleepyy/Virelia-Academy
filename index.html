<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virelia Academy - Database System</title>
    <style>
        /* รีเซ็ตค่าพื้นฐาน */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #050505;
            overflow: hidden;
            overscroll-behavior: none;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            /* เพิ่มระบบป้องกันการคลุมดำข้อความและภาพ */
            user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }

        /* เพิ่มระบบป้องกันการลากรูปภาพและการโต้ตอบกับรูปภาพโดยตรง */
        img {
            -webkit-user-drag: none;
            pointer-events: none; 
        }

        .app-wrapper {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%; height: 100%;
            overflow: hidden;
        }

        /* -------------------------------------------
           GLOBAL CRT EFFECTS
           ------------------------------------------- */
        .noise {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 999; opacity: 0.12;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            animation: noise-anim 0.15s infinite linear;
        }

        .scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1000;
            background: linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,0) 50%, rgba(0,0,0,0.2) 50%, rgba(0,0,0,0.2));
            background-size: 100% 6px;
        }

        .scanline-moving {
            position: absolute; top: 0; left: 0; width: 100%; height: 20px;
            background: rgba(255,255,255,0.05); box-shadow: 0 0 20px rgba(255,255,255,0.1);
            animation: scanline-move 6s linear infinite; z-index: 1001; pointer-events: none;
        }

        .vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.8) 100%);
            pointer-events: none; z-index: 1005;
        }

        .screen-flicker { animation: crt-flicker 0.15s infinite; }

        @keyframes noise-anim {
            0% { transform: translate(0, 0); } 20% { transform: translate(-5%, 5%); }
            40% { transform: translate(5%, -5%); } 60% { transform: translate(-5%, -5%); }
            80% { transform: translate(5%, 5%); } 100% { transform: translate(0, 0); }
        }
        @keyframes scanline-move { 0% { top: -10%; } 100% { top: 110%; } }
        @keyframes crt-flicker { 0% { opacity: 0.95; } 50% { opacity: 1; } 100% { opacity: 0.98; } }

        /* -------------------------------------------
           SCREEN 1: START SCREEN
           ------------------------------------------- */
        .start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }

        .start-glitch-wrapper.is-glitching { animation: btn-glitch-anim 0.2s infinite; }

        @keyframes btn-glitch-anim {
            0%, 100% { transform: translate(0, 0); filter: none; }
            20% { transform: translate(-3px, 2px); filter: drop-shadow(4px 0 0 rgba(0, 255, 255, 0.8)) drop-shadow(-4px 0 0 rgba(255, 0, 0, 0.8)); }
            40% { transform: translate(3px, -2px); filter: drop-shadow(-4px 0 0 rgba(0, 255, 255, 0.8)) drop-shadow(4px 0 0 rgba(255, 0, 0, 0.8)); }
        }

        .cyber-btn {
            position: relative; padding: 20px 60px;
            font-family: 'Courier New', Courier, monospace; font-size: 2.5rem; font-weight: 900;
            color: #ff3333; background: transparent; border: none; cursor: pointer;
            text-transform: uppercase; letter-spacing: 8px;
            clip-path: polygon(20px 0, 100% 0, 100% calc(100% - 20px), calc(100% - 20px) 100%, 0 100%, 0 20px);
            transition: all 0.3s; outline: none;
        }
        .cyber-btn::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: #ff3333; z-index: -2;
        }
        .cyber-btn::after {
            content: ''; position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px;
            background: #050505;
            clip-path: polygon(18px 0, 100% 0, 100% calc(100% - 18px), calc(100% - 18px) 100%, 0 100%, 0 18px);
            z-index: -1; transition: background 0.3s;
        }
        .cyber-btn span { position: relative; z-index: 2; transition: color 0.3s, text-shadow 0.3s; }
        .cyber-btn:hover { filter: drop-shadow(0 0 10px rgba(255, 51, 51, 0.6)); }
        .cyber-btn:hover::after { background: #1a0000; }
        .cyber-btn:hover span { color: #fff; text-shadow: 0 0 15px #ff3333; }

        /* -------------------------------------------
           SCREEN 2: MAIN SYSTEM
           ------------------------------------------- */
        .crt-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 10;
        }

        .tv-turn-on {
            position: absolute; top: 50%; left: 50%; width: 100%; height: 100%;
            background-color: #fff; transform: translate(-50%, -50%) scale(0, 0); z-index: 500;
            animation: turn-on 1.5s cubic-bezier(0.23, 1, 0.32, 1) forwards; pointer-events: none;
        }

        @keyframes turn-on {
            0% { transform: translate(-50%, -50%) scale(0.001, 0.001); background-color: #ffffff; opacity: 1; }
            20% { transform: translate(-50%, -50%) scale(1, 0.005); background-color: #ffffff; opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1, 1); background-color: #ffffff; opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(1, 1); background-color: transparent; opacity: 0; visibility: hidden; }
        }

        .logo-mover {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) scale(1);
            transition: top 1.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        left 1.5s cubic-bezier(0.25, 1, 0.5, 1), 
                        transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 50;
            opacity: 0; 
            animation: show-logo 0.5s 0.8s forwards;
        }
        @keyframes show-logo { to { opacity: 1; } }

        .logo-mover.corner-mode {
            top: 70px; left: 70px;
            transform: translate(-50%, -50%) scale(0.15);
        }

        .glitch-wrapper { position: relative; display: block; width: 450px; aspect-ratio: 1 / 1; }
        .glitch-wrapper.is-spinning { animation: spin-anim 10s linear infinite; }
        @keyframes spin-anim { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .glitch-img {
            display: block; width: 100%; height: 100%; object-fit: contain;
            filter: contrast(1.1) brightness(0.9) drop-shadow(0 0 15px rgba(255, 51, 51, 0.6));
            animation: img-pulse 2s infinite alternate; position: relative; z-index: 2;
        }
        @keyframes img-pulse {
            0% { filter: contrast(1.1) brightness(0.9) drop-shadow(0 0 10px rgba(255, 51, 51, 0.4)); }
            100% { filter: contrast(1.1) brightness(1) drop-shadow(0 0 25px rgba(255, 51, 51, 0.9)); }
        }

        .glitch-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-size: contain; background-position: center; background-repeat: no-repeat;
            opacity: 0; pointer-events: none; z-index: 3;
        }

        .is-glitching .glitch-img { opacity: 0.8; filter: contrast(1.5) brightness(1.2) grayscale(0.2); }
        .is-glitching .glitch-layer-1 {
            opacity: 0.7; transform: translate(-8px, 3px); mix-blend-mode: screen; filter: hue-rotate(90deg) saturate(3);
            animation: glitch-anim-1 0.2s infinite linear alternate-reverse;
        }
        .is-glitching .glitch-layer-2 {
            opacity: 0.7; transform: translate(8px, -3px); mix-blend-mode: screen; filter: hue-rotate(-90deg) saturate(3);
            animation: glitch-anim-2 0.3s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 80% 0); transform: translate(-8px, 1px); }
            50% { clip-path: inset(40% 0 50% 0); transform: translate(8px, -2px); }
            100% { clip-path: inset(10% 0 70% 0); transform: translate(-8px, 1px); }
        }
        @keyframes glitch-anim-2 {
            0% { clip-path: inset(10% 0 60% 0); transform: translate(8px, -1px); }
            50% { clip-path: inset(80% 0 5% 0); transform: translate(-8px, 2px); }
            100% { clip-path: inset(40% 0 30% 0); transform: translate(-8px, 2px); }
        }

        /* -------------------------------------------
           SYSTEM UI (เมนูและเนื้อหา)
           ------------------------------------------- */
        .system-ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column;
            opacity: 0; pointer-events: none; transition: opacity 1s ease-in;
            z-index: 40; padding: 30px 40px; box-sizing: border-box;
        }
        .system-ui.visible { opacity: 1; pointer-events: auto; }

        .top-bar {
            display: flex; justify-content: flex-end; gap: 20px; flex-wrap: wrap; 
            padding-bottom: 20px; border-bottom: 1px solid rgba(255, 51, 51, 0.3);
            margin-left: 100px; flex-shrink: 0; 
        }

        .nav-btn {
            background: transparent; color: #ff3333; border: 1px solid #ff3333;
            padding: 10px 30px; font-family: inherit; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
            transition: all 0.3s; white-space: nowrap; flex-shrink: 0; 
        }
        .nav-btn:hover, .nav-btn.active {
            background: rgba(255, 51, 51, 0.2); text-shadow: 0 0 5px #ff3333; box-shadow: 0 0 10px inset rgba(255,51,51,0.5);
        }

        .sub-bar {
            display: flex; justify-content: flex-end; gap: 15px; flex-wrap: wrap; 
            padding: 0; max-height: 0; overflow: hidden; opacity: 0; 
            transition: max-height 0.4s ease, opacity 0.4s ease, padding 0.4s ease; flex-shrink: 0; 
        }
        .sub-bar.active { 
            max-height: 400px; opacity: 1; padding: 15px 0; overflow: visible; 
        } 

        .room-btn {
            background: transparent; padding: 8px 25px; border: 1px solid var(--r-color);
            color: var(--r-color); font-family: inherit; font-size: 1rem; font-weight: bold;
            cursor: pointer; text-transform: uppercase;
            clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
            transition: all 0.2s; white-space: nowrap; flex-shrink: 0; 
        }
        .room-btn:hover, .room-btn.active {
            background: var(--r-bg); box-shadow: 0 0 10px var(--r-color); text-shadow: 0 0 3px #fff; color: #fff;
        }

        /* พื้นที่แสดงโปรไฟล์ */
        .content-area {
            flex-grow: 1; margin-top: 20px; overflow-y: auto;
            display: flex; justify-content: center; align-items: flex-start; gap: 40px;
            flex-wrap: wrap; padding: 20px; scrollbar-width: thin; scrollbar-color: #ff3333 #000;
        }
        .content-area::-webkit-scrollbar { width: 8px; }
        .content-area::-webkit-scrollbar-track { background: #000; }
        .content-area::-webkit-scrollbar-thumb { background: #ff3333; }

        .profile-card {
            width: 220px; display: flex; flex-direction: column;
            background: rgba(10, 10, 10, 0.8); border: 2px solid var(--theme-color, #ff3333);
            box-shadow: 0 0 15px rgba(0,0,0,0.5), 0 0 10px inset var(--theme-glow, rgba(255,51,51,0.2));
            padding: 15px; position: relative;
            animation: card-appear 0.5s ease-out forwards; opacity: 0; transform: translateY(20px);
        }
        .profile-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 15px; height: 15px;
            border-top: 2px solid #fff; border-left: 2px solid #fff;
        }
        .profile-card::after {
            content: ''; position: absolute; bottom: 0; right: 0; width: 15px; height: 15px;
            border-bottom: 2px solid #fff; border-right: 2px solid #fff;
        }
        @keyframes card-appear { to { opacity: 1; transform: translateY(0); } }

        .profile-img-container {
            width: 100%; aspect-ratio: 3/4; overflow: hidden;
            border: 1px solid var(--theme-color); margin-bottom: 15px; position: relative;
        }
        .profile-img {
            width: 100%; height: 100%; object-fit: cover; filter: grayscale(0.5) contrast(1.2);
            transition: filter 0.3s;
        }
        .profile-card:hover .profile-img { filter: grayscale(0) contrast(1.1); }
        .profile-img-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.2) 3px, rgba(0,0,0,0.2) 4px);
            pointer-events: none;
        }

        .profile-name {
            font-size: 1rem; font-weight: bold; text-align: center; margin-bottom: 15px;
            color: var(--theme-color); text-transform: uppercase; letter-spacing: 1px;
            min-height: 40px; display: flex; align-items: center; justify-content: center;
        }

        .detail-btn {
            background: rgba(255,255,255,0.1); border: 1px solid var(--theme-color);
            color: #fff; padding: 8px 0; width: 100%; font-family: inherit; cursor: pointer;
            text-transform: uppercase; transition: all 0.2s; font-size: 0.9rem;
        }
        .detail-btn:hover { background: var(--theme-color); color: #000; font-weight: bold; }

        /* -------------------------------------------
           MODAL (หน้าต่างรายละเอียด)
           ------------------------------------------- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(5px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 150;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }

        .modal-box {
            background: #0a0a0a; border: 2px solid var(--theme-color, #fff);
            width: 750px; max-width: 90%; max-height: 85vh; padding: 30px;
            position: relative; box-shadow: 0 0 30px var(--theme-glow, rgba(255,255,255,0.2));
            display: flex; gap: 20px; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--theme-color) #000;
        }
        .modal-box::-webkit-scrollbar { width: 8px; }
        .modal-box::-webkit-scrollbar-track { background: #000; }
        .modal-box::-webkit-scrollbar-thumb { background: var(--theme-color); }
        
        .modal-close {
            position: absolute; top: 10px; right: 15px; background: none; border: none;
            color: var(--theme-color); font-size: 1.5rem; cursor: pointer; font-family: inherit;
        }
        .modal-close:hover { color: #fff; text-shadow: 0 0 10px #fff; }

        .modal-left { width: 40%; flex-shrink: 0; }
        .modal-left img { width: 100%; border: 1px solid var(--theme-color); filter: grayscale(0.2); }
        
        .modal-right { width: 60%; display: flex; flex-direction: column; }
        .modal-name { font-size: 1.5rem; color: var(--theme-color); margin: 0 0 15px 0; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .modal-info { color: #ccc; line-height: 1.5; font-size: 0.95rem; display: flex; flex-direction: column; gap: 8px; }
        .modal-info p { margin: 0; }
        .modal-info span.title { color: var(--theme-color); font-weight: bold; min-width: 130px; display: inline-block; vertical-align: top; }
        .modal-info span.desc { display: inline-block; max-width: calc(100% - 135px); vertical-align: top; }

        /* -------------------------------------------
           COLOR THEMES
           ------------------------------------------- */
        .theme-gifted { --theme-color: #FFD700; --theme-glow: rgba(255, 215, 0, 0.3); }
        .theme-a { --theme-color: #FF3333; --theme-glow: rgba(255, 51, 51, 0.3); }
        .theme-b { --theme-color: #AAAAAA; --theme-glow: rgba(170, 170, 170, 0.3); }
        .theme-c { --theme-color: #00FFFF; --theme-glow: rgba(0, 255, 255, 0.3); }
        .theme-d { --theme-color: #00FF00; --theme-glow: rgba(0, 255, 0, 0.3); }
        
        #btn-gifted { --r-color: #FFD700; --r-bg: rgba(255, 215, 0, 0.2); }
        #btn-a { --r-color: #FF3333; --r-bg: rgba(255, 51, 51, 0.2); }
        #btn-b { --r-color: #AAAAAA; --r-bg: rgba(170, 170, 170, 0.2); }
        #btn-c { --r-color: #00FFFF; --r-bg: rgba(0, 255, 255, 0.2); }
        #btn-d { --r-color: #00FF00; --r-bg: rgba(0, 255, 0, 0.2); }

        /* -------------------------------------------
           RESPONSIVE 
           ------------------------------------------- */
        @media (max-width: 768px) {
            .system-ui { padding: 20px 15px; }
            .top-bar { margin-left: 60px; justify-content: center; gap: 10px; }
            .nav-btn { padding: 8px 15px; font-size: 1rem; }
            .sub-bar { justify-content: center; gap: 10px; } 
            .room-btn { padding: 6px 15px; font-size: 0.9rem; }
            
            .modal-box { flex-direction: column; padding: 20px; }
            .modal-left { width: 100%; max-width: 200px; margin: 0 auto 15px auto; }
            .modal-right { width: 100%; }
            .modal-name { font-size: 1.3rem; text-align: center; }
            .modal-info span.title { min-width: 100px; }
            .modal-info span.desc { max-width: calc(100% - 105px); }
        }
    </style>
</head>
<body class="screen-flicker">

    <div class="app-wrapper">
        <div class="noise"></div>
        <div class="scanlines"></div>
        <div class="scanline-moving"></div>
        <div class="vignette"></div>

        <div id="start-screen" class="start-screen">
            <div class="start-glitch-wrapper" id="btn-glitch-wrapper">
                <button class="cyber-btn" id="connect-btn"><span>CONNECT</span></button>
            </div>
        </div>

        <div id="main-crt" class="crt-container">
            <div class="tv-turn-on"></div>
            <div id="logo-mover" class="logo-mover">
                <div class="glitch-wrapper" id="glitch-wrapper">
                    <img src="logo.png" id="main-logo" class="glitch-img" alt="Virelia Logo" onerror="handleImageError(this)">
                    <div class="glitch-layer glitch-layer-1"></div>
                    <div class="glitch-layer glitch-layer-2"></div>
                </div>
            </div>

            <div id="system-ui" class="system-ui">
                <div class="top-bar">
                    <button class="nav-btn" id="nav-student">ข้อมูลนักเรียน</button>
                    <button class="nav-btn" id="nav-credit">เครดิต</button>
                </div>

                <div class="sub-bar" id="sub-nav-rooms">
                    <button class="room-btn" id="btn-gifted" data-room="gifted">ห้อง GIFTED</button>
                    <button class="room-btn" id="btn-a" data-room="a">ห้อง A</button>
                    <button class="room-btn" id="btn-b" data-room="b">ห้อง B</button>
                    <button class="room-btn" id="btn-c" data-room="c">ห้อง C</button>
                    <button class="room-btn" id="btn-d" data-room="d">ห้อง D</button>
                </div>

                <div class="content-area" id="content-display"></div>
            </div>

            <!-- MODAL รายละเอียด (อัปเดตหัวข้อตามข้อมูลจริง) -->
            <div class="modal-overlay" id="detail-modal">
                <div class="modal-box" id="modal-content">
                    <button class="modal-close" id="close-modal">[X]</button>
                    <div class="modal-left">
                        <img id="m-img" src="" alt="Profile">
                    </div>
                    <div class="modal-right">
                        <h2 class="modal-name" id="m-name">NAME</h2>
                        <div class="modal-info">
                            <p><span class="title">อายุ / วันเกิด:</span> <span class="desc" id="m-age"></span></p>
                            <p><span class="title">เพศ:</span> <span class="desc" id="m-gender"></span></p>
                            <p><span class="title">บทบาท:</span> <span class="desc" id="m-role"></span></p>
                            <p><span class="title">ห้อง:</span> <span class="desc" id="m-room"></span></p>
                            <p><span class="title">ทักษะ:</span> <span class="desc" id="m-skill"></span></p>
                            <p><span class="title">สรีระ:</span> <span class="desc" id="m-body"></span></p>
                            <p><span class="title">อุปนิสัย:</span> <span class="desc" id="m-personality"></span></p>
                            <p><span class="title">รสนิยม:</span> <span class="desc" id="m-likes"></span></p>
                            <p><span class="title">สิ่งที่เกลียด:</span> <span class="desc" id="m-dislikes"></span></p>
                            <p><span class="title">เอกลักษณ์:</span> <span class="desc" id="m-identity"></span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ป้องกันการคลิกขวา (Right Click) ทั่วทั้งหน้าเว็บ
        document.addEventListener('contextmenu', event => event.preventDefault());
        
        // ป้องกันการลากคลุมหรือลากรูปภาพ (Drag Start)
        document.addEventListener('dragstart', event => event.preventDefault());

        function setupGlitchLayers(src) {
            const layers = document.querySelectorAll('.glitch-layer');
            layers.forEach(layer => { layer.style.backgroundImage = `url('${src}')`; });
        }

        window.handleImageError = function(img) {
            img.onerror = null; 
            const fallbackSrc = 'https://i.ibb.co/9HM6dGQG/175-20260413000814.png';
            img.src = fallbackSrc; 
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', () => setupGlitchLayers(fallbackSrc));
            } else {
                setupGlitchLayers(fallbackSrc);
            }
        };

        // ฐานข้อมูลนักเรียน (ข้อมูลจริงจากที่ให้มา)
const studentDatabase = {
            'gifted': {

        document.addEventListener('DOMContentLoaded', () => {
            const startScreen = document.getElementById('start-screen');
            const mainCrt = document.getElementById('main-crt');
            const connectBtn = document.getElementById('connect-btn');
            const btnGlitchWrapper = document.getElementById('btn-glitch-wrapper');
            const logoMover = document.getElementById('logo-mover');
            const logoWrapper = document.getElementById('glitch-wrapper');
            const imgElement = document.getElementById('main-logo');
            
            const systemUi = document.getElementById('system-ui');
            const navStudent = document.getElementById('nav-student');
            const navCredit = document.getElementById('nav-credit');
            const subNavRooms = document.getElementById('sub-nav-rooms');
            const roomBtns = document.querySelectorAll('.room-btn');
            const contentDisplay = document.getElementById('content-display');
            
            const modalOverlay = document.getElementById('detail-modal');
            const modalContent = document.getElementById('modal-content');
            const closeModal = document.getElementById('close-modal');

            // ใช้ Fallback รูปเมื่อโลโก้โหลดไม่ผ่าน
            if(imgElement.complete) { setupGlitchLayers(imgElement.src); }

            let btnGlitchTimeout;
            function triggerBtnGlitch() {
                btnGlitchWrapper.classList.add('is-glitching');
                setTimeout(() => {
                    btnGlitchWrapper.classList.remove('is-glitching');
                    btnGlitchTimeout = setTimeout(triggerBtnGlitch, Math.random() * 3000 + 1000);
                }, Math.random() * 200 + 100);
            }
            triggerBtnGlitch();

            function triggerLogoGlitch() {
                logoWrapper.classList.add('is-glitching');
                setTimeout(() => {
                    logoWrapper.classList.remove('is-glitching');
                    setTimeout(triggerLogoGlitch, Math.random() * 3500 + 1500);
                }, Math.random() * 300 + 100);
            }

            connectBtn.addEventListener('click', () => {
                clearTimeout(btnGlitchTimeout);
                startScreen.style.display = 'none';
                mainCrt.style.display = 'block';
                
                setTimeout(() => {
                    triggerLogoGlitch();
                    setTimeout(() => {
                        logoMover.classList.add('corner-mode');
                        logoWrapper.classList.add('is-spinning');
                        setTimeout(() => { systemUi.classList.add('visible'); }, 1500);
                    }, 2000);
                }, 1500);
            });

            navStudent.addEventListener('click', () => {
                navStudent.classList.add('active');
                navCredit.classList.remove('active');
                subNavRooms.classList.add('active');
                contentDisplay.innerHTML = '<p style="color:#aaa; font-style:italic; margin-top:50px;">กรุณาเลือกห้องเพื่อดูข้อมูลนักเรียน...</p>';
                roomBtns.forEach(b => b.classList.remove('active'));
            });

            navCredit.addEventListener('click', () => {
                navCredit.classList.add('active');
                navStudent.classList.remove('active');
                subNavRooms.classList.remove('active');
                contentDisplay.innerHTML = `
                    <div style="text-align:center; padding: 50px; background: rgba(0,0,0,0.7); border: 1px solid #ff3333; max-width: 600px; margin-top: 50px; box-shadow: 0 0 20px rgba(255,51,51,0.2);">
                        <h2 style="color: #ff3333; letter-spacing: 5px;">VIRELIA ACADEMY DATABASE</h2>
                        <p style="color: #ccc; line-height: 2;">System Version: 2.1.00<br>Updated on: May 2026<br>Status: SECURE</p>
                    </div>
                `;
            });

            roomBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    roomBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    const roomId = btn.getAttribute('data-room');
                    const roomData = studentDatabase[roomId];
                    contentDisplay.innerHTML = '';

                    roomData.students.forEach((student, index) => {
                        const card = document.createElement('div');
                        card.className = `profile-card ${roomData.theme}`;
                        card.style.animationDelay = `${index * 0.1}s`; 
                        
                        // ใช้ภาพสำรองหากโหลดไฟล์ G1.png, A1.png ไม่ขึ้น
                        card.innerHTML = `
                            <div class="profile-img-container">
                                <img src="${student.img}" class="profile-img" alt="${student.name}" onerror="this.onerror=null; this.src='https://placehold.co/300x400/222/555?text=NO+IMAGE';">
                            </div>
                            <div class="profile-name">${student.name}</div>
                            <button class="detail-btn">รายละเอียด</button>
                        `;

                        card.querySelector('.detail-btn').addEventListener('click', () => {
                            openModal(student, roomData.theme, roomData.roomName);
                        });

                        contentDisplay.appendChild(card);
                    });
                });
            });

            function openModal(studentData, themeClass, roomNameStr) {
                // ดึงภาพ ถ้าโหลดไม่สำเร็จใช้ภาพ NO IMAGE
                const mImg = document.getElementById('m-img');
                mImg.src = studentData.img;
                mImg.onerror = function() { this.src = 'https://placehold.co/300x400/222/555?text=NO+IMAGE'; };
                
                document.getElementById('m-name').textContent = studentData.name;
                document.getElementById('m-age').textContent = studentData.age;
                document.getElementById('m-gender').textContent = studentData.gender;
                document.getElementById('m-role').textContent = studentData.role;
                document.getElementById('m-room').textContent = roomNameStr;
                document.getElementById('m-skill').textContent = studentData.skill;
                document.getElementById('m-body').textContent = studentData.body;
                document.getElementById('m-personality').textContent = studentData.personality;
                document.getElementById('m-likes').textContent = studentData.likes;
                document.getElementById('m-dislikes').textContent = studentData.dislikes;
                document.getElementById('m-identity').textContent = studentData.identity;

                modalContent.className = `modal-box ${themeClass}`;
                modalOverlay.classList.add('active');
            }

            closeModal.addEventListener('click', () => { modalOverlay.classList.remove('active'); });
            modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) { modalOverlay.classList.remove('active'); }});
        });
    </script>
</body>
</html>
